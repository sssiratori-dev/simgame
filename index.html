<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>経営シミュレーション - SIMgame</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ヘッダー -->
  <header class="header">
    <h1>🏪 経営シミュレーション</h1>
    <p>店舗を購入・拡大して、ビジネス帝国を築こう！</p>
  </header>

  <!-- 情報パネル -->
  <div class="info-panel">
    <div class="info-item">
      <span class="label">💰 所持金:</span>
      <span class="value" id="moneyDisplay">1,000</span>
      <span class="unit">円</span>
    </div>
    <div class="info-item">
      <span class="label">🏢 店舗数:</span>
      <span class="value" id="shopCountDisplay">0</span>
      <span class="unit">軒</span>
    </div>
    <div class="info-item">
      <span class="label">💸 毎秒収入:</span>
      <span class="value" id="incomePerSecDisplay">0</span>
      <span class="unit">円/秒</span>
    </div>
  </div>

  <!-- 統計パネル -->
  <div class="stats-panel collapsed" id="statsPanel">
    <button class="stats-toggle" onclick="toggleStats()">📊 統計データ</button>
    <div class="stats-content">
      <div class="stat-item">
        <div class="stat-label">💰 累計収益</div>
        <div class="stat-value" id="totalEarnedDisplay">0円</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">⏱️ プレイ時間</div>
        <div class="stat-value" id="playtimeDisplay">0秒</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">🏆 最高収入の店舗</div>
        <div class="stat-value" id="topShopDisplay">--</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">🔓 解放済みセル</div>
        <div class="stat-value" id="unlockedCellsDisplay">0 / 4</div>
      </div>
    </div>
  </div>

  <!-- タブメニュー -->
  <div class="tabs-container">
    <button class="tab-button active" data-tab="shops">🛍️ ショップ一覧</button>
    <button class="tab-button" data-tab="map">🗺️ マップ配置</button>
  </div>

  <!-- メインコンテンツ -->
  <main class="main-content">
    <!-- ショップタブ -->
    <div class="tab-content active" id="shops-tab">
      <h2>🛍️ 利用可能な店舗</h2>
      <div class="shops-container" id="shopsContainer">
        <!-- JavaScriptで動的に生成 -->
      </div>
    </div>

    <!-- マップタブ -->
    <div class="tab-content" id="map-tab">
      <h2>🗺️ マップに店舗を配置</h2>
      <div class="map-section">
        <!-- 配置待ちの店舗リスト -->
        <div class="map-sidebar">
          <h3>配置可能な店舗</h3>
          <div class="available-shops" id="availableShops">
            <!-- JavaScriptで動的に生成 -->
          </div>
        </div>

        <!-- マップグリッド -->
        <div class="map-container">
          <div class="map-grid" id="mapGrid">
            <!-- 3x3 グリッドセルを JavaScriptで生成 -->
          </div>
          <p class="map-hint">
            📌 <strong>地形ボーナス</strong>: 🏪商業地区×1.5 / 🚉交通拠点×1.3 / 🏘️住宅地区×1.1<br>
            🔒ロックセルは800円で解放 ｜ ⚡隣接シナジーで追加ボーナス ｜ 🎲ランダムイベントが発生します！
          </p>
        </div>
      </div>

      <!-- マップコントロール -->
      <div class="map-controls">
        <button class="btn btn-reset" onclick="mapModule.clearMap()">
          🗑️ マップをクリア
        </button>
      </div>
    </div>
  </main>

  <!-- フッター -->
  <footer class="footer">
    <p>💾 ゲームは自動保存されています（3秒ごと）</p>
    <p>
      <button class="btn btn-reset" onclick="gameState.reset()">
        🔄 ゲームをリセット
      </button>
    </p>
  </footer>

  <!-- トースト通知 -->
  <div id="toastContainer"></div>

  <!-- セルツールチップ -->
  <div id="cellTooltip" class="cell-tooltip hidden"></div>

  <!-- スクリプト読み込み -->
  <script src="Script/map.js"></script>
  <script src="main.js"></script>
</body>
</html>

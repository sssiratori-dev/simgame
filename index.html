<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Demo</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    #info {
      margin: 16px 0 0;
      text-align: center;
    }
    canvas {
      border: 2px solid #444;
      background: #000;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="info">矢印キーでプレイヤーを移動。スペースキーでリセット。</div>
  <script src="main.js"></script>
</body>
</html>
